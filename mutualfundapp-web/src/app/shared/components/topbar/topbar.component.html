<header class="topbar">
    <!-- Left: Menu toggle + page title -->
    <div class="topbar-left">
        <button class="menu-btn" (click)="menuToggle.emit()" title="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>
        <div class="page-info">
            <h2 class="page-title">{{ pageTitle }}</h2>
        </div>
    </div>

    <!-- Right: User menu -->
    <div class="topbar-right">
        <!-- Role badge -->
        <span class="role-badge" [class.role-admin]="userRole === 'Admin'"
            [class.role-employee]="userRole === 'Employee'" [class.role-user]="userRole === 'User'">
            <i class="fas" [class.fa-crown]="userRole === 'Admin'" [class.fa-briefcase]="userRole === 'Employee'"
                [class.fa-user]="userRole === 'User'">
            </i>
            {{ userRole }}
        </span>

        <!-- User dropdown -->
        <div class="user-menu" (clickOutside)="closeDropdown()">
            <button class="user-btn" (click)="toggleDropdown()">
                <div class="avatar">{{ userInitials }}</div>
                <div class="user-details">
                    <span class="user-name">{{ userName }}</span>
                    <span class="user-email">{{ userEmail }}</span>
                </div>
                <i class="fas fa-chevron-down chevron" [class.rotated]="showDropdown">
                </i>
            </button>

            <!-- Dropdown menu -->
            <div class="dropdown-menu" *ngIf="showDropdown">
                <div class="dropdown-header">
                    <div class="avatar avatar-lg">{{ userInitials }}</div>
                    <div>
                        <p class="dropdown-name">{{ userName }}</p>
                        <p class="dropdown-email">{{ userEmail }}</p>
                    </div>
                </div>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" routerLink="/admin/profile">
                    <i class="fas fa-user"></i> My Profile
                </button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item dropdown-item-danger" (click)="logout()">
                    <i class="fas fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>
    </div>
</header>
